server:
  port: "8080"
  mode: "debug"

database:
  mysql:
    dsn: "root:PaiSmart2025@tcp(mysql:3306)/PaiSmart?charset=utf8mb4&parseTime=True&loc=Local"
  redis:
    addr: "redis:6379"
    password: "PaiSmart2025"
    db: 0

jwt:
  secret: "PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc="
  access_token_expire_hours: 24
  refresh_token_expire_days: 7

log:
  level: "debug"
  format: "json"
  output_path: "./logs"

kafka:
  brokers: "kafka:29092"
  topic: "file-parse"
  consumer_group_prefix: "paismart-go-docker-stack"
  max_retries: 3
  base_backoff_ms: 800
  embedding_batch_size: 8
  es_bulk_batch_size: 100
  topics:
    parse: "file-parse"
    chunk: "file-chunk"
    embed: "file-embed"
    index: "file-index"
    dlq: "file-dlq"

minio:
  endpoint: "minio:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_ssl: false
  bucket_name: "uploads"

tika:
  server_url: "http://tika:9998"

elasticsearch:
  addresses: "http://es:9200"
  username: ""
  password: ""
  index_name: "knowledge_base_docker_stack"

embedding:
  model: "BAAI/bge-small-zh-v1.5"
  api_key: ""
  base_url: "http://embedding:8009"
  dimensions: 512

llm:
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  api_key: "${PAISMART_LLM_API_KEY}"
  prompt:
    rules: |
      你是企业知识库问答助手。
      1. 使用简体中文回答。
      2. 优先基于检索上下文回答。
      3. 如果检索上下文不足，明确说明。
    ref_start: "<<REF>>"
    ref_end: "<<END>>"
    no_result_text: "（本轮无检索结果）"
  generation:
    temperature: 0.3
    max_tokens: 1200
    top_p: 0.9

retrieval:
  bm25_topn: 100
  vector_topn: 100
  rrf_k: 60
  rerank_topn: 100
  final_topk: 5
  rerank_timeout_ms: 120

reranker:
  enabled: false
  base_url: ""
  api_key: ""
  model: ""

memory:
  enabled: true
  memory_index_name: "conversation_memory_docker_stack"
  sensory_max_messages: 6
  sensory_max_tokens: 800
  working_trigger_messages: 8
  working_max_facts: 6
  working_history_messages: 12
  profile_max_slots: 6
  long_term_topk: 4
  context_topk: 6
  long_term_min_importance: 0.45

ai:
  orchestrator:
    enabled: false
    ingestion_enabled: false
    base_url: "http://host.docker.internal:8090"
    timeout_ms: 120000
    ingestion_timeout_ms: 180000
    shared_secret: "paismart-internal-dev"
